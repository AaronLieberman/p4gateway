# Live end-to-end integration test: drives `gw integtest run` against a real,
# throwaway Perforce server booted on the Windows runner. Kept in its own
# workflow (not a job in ci.yml) so a Perforce download hiccup or a p4d quirk
# never blocks a normal build/unit-test merge. Windows-only because this is the
# path that exercises the client LineEnd (CRLF) translation the mirror relies on.
name: integtest

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integtest:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      # Pinned Perforce release; bump deliberately (and the cache re-fetches).
      P4_VERSION: r25.1
      # Pinned git-branchless release. The integtest's final steps exercise gw's
      # git-branchless-specific import behavior; CI just needs *a* branchless on
      # PATH (any recent release), not the developer's exact version.
      BRANCHLESS_VERSION: v0.11.1
      # Ambient connection settings. gw and p4 both read these from the
      # environment; the integtest driver runs with no -c client of its own.
      P4PORT: localhost:1666
      P4USER: integtest
      P4CLIENT: integtest-ws
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      # p4d and p4 are single-file downloads; cache them so a flaky Perforce
      # CDN doesn't fail every run. Keyed on the pinned version.
      - name: Cache Perforce binaries
        id: cache-p4
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\p4bin
          key: perforce-${{ env.P4_VERSION }}-ntx64

      - name: Download Perforce binaries
        if: steps.cache-p4.outputs.cache-hit != 'true'
        run: |
          $dir = "${{ runner.temp }}\p4bin"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $base = "https://cdist2.perforce.com/perforce/$env:P4_VERSION/bin.ntx64"
          curl.exe -fsS -o "$dir\p4.exe"  "$base/p4.exe"
          curl.exe -fsS -o "$dir\p4d.exe" "$base/p4d.exe"

      # Put p4/p4d on PATH for every later step (and for the `p4` calls gw makes
      # via its shell). GITHUB_PATH takes effect in subsequent steps, not this one.
      - name: Add Perforce binaries to PATH
        run: Add-Content -Path $env:GITHUB_PATH -Value "${{ runner.temp }}\p4bin"

      # git-branchless ships a prebuilt single-binary zip per release; cache the
      # extracted binary keyed on the pinned version (a cold cache is a ~6 MB
      # download, not a source build).
      - name: Cache git-branchless
        id: cache-branchless
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\gbbin
          key: git-branchless-${{ env.BRANCHLESS_VERSION }}-ntx64

      - name: Download git-branchless
        if: steps.cache-branchless.outputs.cache-hit != 'true'
        run: |
          $dir = "${{ runner.temp }}\gbbin"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $ver = "$env:BRANCHLESS_VERSION"
          $zip = "git-branchless-$ver-x86_64-pc-windows-msvc.zip"
          $url = "https://github.com/arxanas/git-branchless/releases/download/$ver/$zip"
          curl.exe -fsSL -o "$env:RUNNER_TEMP\gb.zip" "$url"
          Expand-Archive -Path "$env:RUNNER_TEMP\gb.zip" -DestinationPath $dir -Force

      # Add the directory holding git-branchless.exe to PATH (robust to whether
      # the archive nests it in a subfolder). Runs on cache hit and miss alike.
      - name: Add git-branchless to PATH
        run: |
          $exe = Get-ChildItem -Path "${{ runner.temp }}\gbbin" -Recurse -Filter git-branchless.exe |
            Select-Object -First 1
          if (-not $exe) { throw "git-branchless.exe not found under the extracted archive" }
          Add-Content -Path $env:GITHUB_PATH -Value $exe.Directory.FullName
          Write-Host "git-branchless at $($exe.FullName)"

      - name: Start throwaway p4d
        run: |
          $root = "${{ runner.temp }}\p4root"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          # The sentinel ServerID gw integtest requires before it will touch the
          # server; p4d reads it from server.id at startup. A fresh server also
          # defaults to security level 0, the other half of the throwaway gate.
          Set-Content -Path "$root\server.id" -Value "p4gw-integtest-throwaway" -NoNewline
          # Detached so it outlives this step; -L keeps a server log for triage.
          Start-Process -FilePath "$env:RUNNER_TEMP\p4bin\p4d.exe" `
            -ArgumentList @("-r", $root, "-p", "1666", "-L", "$root\p4d.log")
          # Wait for it to accept connections before scripting against it.
          $up = $false
          foreach ($i in 1..30) {
            & "$env:RUNNER_TEMP\p4bin\p4.exe" info 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) { $up = $true; break }
            Start-Sleep -Seconds 1
          }
          if (-not $up) { throw "p4d did not start listening on $env:P4PORT" }
          p4 info

      - name: Create the P4 user and client
        run: |
          # Fresh, unsecured server: the first user is created with no password.
          @(p4 user -o) | p4 user -i

          # The client Root is the p4gw-test directory (the Git repo root the
          # integtest runs in). Build its spec from the default template and
          # append the remap that mirrors the src subtree into .p4gw/src. The
          # remap goes last because p4 view lines are resolved later-wins.
          $root = "$env:GITHUB_WORKSPACE\p4gw-test"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          Set-Location $root
          $lines = @(p4 client -o)
          while ($lines.Count -gt 0 -and $lines[-1].Trim() -eq "") {
            $lines = $lines[0..($lines.Count - 2)]
          }
          $lines += "`t//depot/src/... //$env:P4CLIENT/.p4gw/src/..."
          $lines | p4 client -i
          p4 client -o   # echo the resulting spec for the log

      # gw commits during the run; a hosted runner has no git identity by default.
      - name: Configure git identity
        run: |
          git config --global user.email "integtest@example.com"
          git config --global user.name "p4gw integtest"

      - name: Run gw integtest
        working-directory: p4gw-test
        run: |
          & "$env:GITHUB_WORKSPACE\build\Release\gw.exe" integtest run --verbose

      # On failure, the p4d server log is the most useful artifact for triage.
      - name: Show p4d log
        if: failure()
        run: Get-Content "${{ runner.temp }}\p4root\p4d.log" -ErrorAction SilentlyContinue
